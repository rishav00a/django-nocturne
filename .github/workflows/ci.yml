name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Python 3.9 only supports Django 4.2
          - python-version: "3.9"
            django-version: "4.2"
          # Python 3.10 supports Django 4.2 and 5.1
          - python-version: "3.10"
            django-version: "4.2"
          - python-version: "3.10"
            django-version: "5.1"
          # Python 3.11 supports Django 4.2 and 5.1
          - python-version: "3.11"
            django-version: "4.2"
          - python-version: "3.11"
            django-version: "5.1"
          # Python 3.12 supports Django 4.2 and 5.1
          - python-version: "3.12"
            django-version: "4.2"
          - python-version: "3.12"
            django-version: "5.1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Django ${{ matrix.django-version }}
        run: pip install "django~=${{ matrix.django-version }}"

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Run coverage
        if: matrix.python-version == '3.12' && matrix.django-version == '5.1'
        run: pytest tests/ --cov=nocturne --cov-report=term-missing
